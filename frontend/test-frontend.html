<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前端功能测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            line-height: 1.6;
        }
        .test-item {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        .warning { background: #fff3cd; border-color: #ffeeba; }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover { background: #0056b3; }
        #results { margin-top: 20px; }
        .log {
            background: #f5f5f5;
            padding: 10px;
            margin: 10px 0;
            border-radius: 3px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>🔧 QuickChat 前端功能测试</h1>

    <div class="test-item">
        <h2>1. API 连接测试</h2>
        <button onclick="testAPI()">测试 API 连接</button>
        <div id="api-result"></div>
    </div>

    <div class="test-item">
        <h2>2. WebSocket 连接测试</h2>
        <button onclick="testWebSocket()">测试 WebSocket 连接</button>
        <div id="ws-result"></div>
    </div>

    <div class="test-item">
        <h2>3. 频道列表测试</h2>
        <button onclick="testChannels()">获取频道列表</button>
        <div id="channels-result"></div>
    </div>

    <div class="test-item">
        <h2>4. 消息发送测试</h2>
        <input type="text" id="test-message" placeholder="输入测试消息">
        <button onclick="testSendMessage()">发送消息</button>
        <div id="send-result"></div>
    </div>

    <div id="results"></div>

    <script>
        const API_URL = 'http://localhost:3001';
        let socket = null;

        function log(elementId, message, type = 'info') {
            const element = document.getElementById(elementId);
            const className = type === 'success' ? 'success' : type === 'error' ? 'error' : 'warning';
            element.innerHTML = `<div class="log ${className}">${message}</div>`;
        }

        async function testAPI() {
            try {
                log('api-result', '正在测试 API 连接...');
                const response = await fetch(`${API_URL}/channels`);
                if (response.ok) {
                    const data = await response.json();
                    log('api-result', `✅ API 连接成功！找到 ${data.length || 0} 个频道`, 'success');
                } else {
                    log('api-result', `❌ API 连接失败: ${response.status}`, 'error');
                }
            } catch (error) {
                log('api-result', `❌ API 连接错误: ${error.message}`, 'error');
            }
        }

        function testWebSocket() {
            try {
                log('ws-result', '正在测试 WebSocket 连接...');

                socket = io(API_URL, {
                    auth: { userId: 'test-user-' + Date.now() },
                    transports: ['websocket', 'polling'],
                });

                socket.on('connect', () => {
                    log('ws-result', `✅ WebSocket 连接成功！Socket ID: ${socket.id}`, 'success');
                });

                socket.on('connect_error', (err) => {
                    log('ws-result', `❌ WebSocket 连接错误: ${err.message}`, 'error');
                });

                setTimeout(() => {
                    if (socket && !socket.connected) {
                        log('ws-result', '❌ WebSocket 连接超时', 'error');
                    }
                }, 5000);
            } catch (error) {
                log('ws-result', `❌ WebSocket 初始化错误: ${error.message}`, 'error');
            }
        }

        async function testChannels() {
            try {
                log('channels-result', '正在获取频道列表...');
                const response = await fetch(`${API_URL}/channels`);
                if (response.ok) {
                    const channels = await response.json();
                    log('channels-result', `✅ 获取频道成功！\n${JSON.stringify(channels, null, 2)}`, 'success');
                } else {
                    log('channels-result', `❌ 获取频道失败: ${response.status}`, 'error');
                }
            } catch (error) {
                log('channels-result', `❌ 获取频道错误: ${error.message}`, 'error');
            }
        }

        async function testSendMessage() {
            const messageInput = document.getElementById('test-message');
            const content = messageInput.value.trim();

            if (!content) {
                log('send-result', '❌ 请输入消息内容', 'error');
                return;
            }

            try {
                log('send-result', '正在发送消息...');
                const channelId = '8a7403bb-bb82-4de6-b321-bbf4f4d1d609'; // 测试频道ID
                const response = await fetch(`${API_URL}/channels/${channelId}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content,
                        userId: 'test-user',
                        username: 'TestUser'
                    }),
                });

                if (response.ok) {
                    const result = await response.json();
                    log('send-result', `✅ 消息发送成功！\n${JSON.stringify(result, null, 2)}`, 'success');
                    messageInput.value = '';
                } else {
                    const error = await response.json();
                    log('send-result', `❌ 发送失败: ${error.message || response.status}`, 'error');
                }
            } catch (error) {
                log('send-result', `❌ 发送错误: ${error.message}`, 'error');
            }
        }

        // 页面加载时自动测试
        window.onload = () => {
            console.log('📋 前端功能测试页面已加载');
            console.log('🔗 API URL:', API_URL);
            console.log('💡 请点击按钮进行各项测试');
        };
    </script>

    <script src="https://cdn.socket.io/4.8.0/socket.io.min.js"></script>
</body>
</html>
